name: issue_comment
on:
  issue_comment:
    
permissions: {}

jobs:
  one:
    runs-on: ubuntu-22.04
    if: github.event.comment.body == "test"
    env:
      FLAG: ${{ secrets.FLAG }}
    steps:
      - uses: actions/checkout@v4
        with:  
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
      - run: bash test.sh
