name: auto approve check
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Workflow run ID whose check suite to rerequest"
        required: true
        type: string

jobs:
  rerequest:
    runs-on: ubuntu-latest
    steps:
      - name: Mint installation token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}

      - name: Rerequest check suite
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail

          SUITE_ID=$(gh api "/repos/$REPO/actions/runs/$RUN_ID" --jq .check_suite_id)
          echo "run $RUN_ID -> check_suite $SUITE_ID"

          gh api -X POST "/repos/$REPO/check-suites/$SUITE_ID/rerequest"
          echo "rerequested"
